<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGuard — AI Risk Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #15151d;
    --border: #2a2a35;
    --text: #f5f5f7;
    --text-dim: #9aa0ab;
    --accent: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28px 20px 60px;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .pill {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover, .pill:active {
    border-color: var(--accent);
    color: var(--text);
  }
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  button:active { opacity: 0.85; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .token-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .token-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #1f1f29;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .token-name { font-size: 17px; font-weight: 500; }
  .token-symbol { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 24px;
  }
  .price { font-size: 26px; font-weight: 500; }
  .change {
    font-size: 13px;
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 500;
  }
  .change.pos { background: rgba(34,197,94,0.15); color: var(--green); }
  .change.neg { background: rgba(239,68,68,0.15); color: var(--red); }

  .score-section {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .score-ring {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .score-ring-inner {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1;
  }
  .score-max { font-size: 10px; color: var(--text-dim); }
  .score-label-group .level {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .score-label-group .desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .breakdown-title {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .bar-row { margin-bottom: 12px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .bar-label .name { color: var(--text); }
  .bar-label .val { color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .bar-track {
    background: #1f1f29;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width 0.6s ease;
  }

  /* AI Insight card */
  .ai-card {
    background: linear-gradient(135deg, rgba(129,140,248,0.08), rgba(129,140,248,0.02));
    border: 1px solid rgba(129,140,248,0.25);
  }
  .ai-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .ai-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ai-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .ai-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-text.dim { color: var(--text-dim); font-style: italic; }
  .ai-shimmer {
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(90deg, #1f1f29 25%, #2a2a35 50%, #1f1f29 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-bottom: 8px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .loading, .error {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 24px 0;
  }
  .error { color: var(--red); }

  .footer-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
</style>
</head>
<body>

  <h1>PulseGuard</h1>
  <div class="subtitle">AI-powered risk scoring for Solana ecosystem tokens</div>

  <div class="pills">
    <span class="pill" onclick="run('solana')">SOL</span>
    <span class="pill" onclick="run('jupiter-exchange-solana')">JUP</span>
    <span class="pill" onclick="run('bonk')">BONK</span>
    <span class="pill" onclick="run('raydium')">RAY</span>
    <span class="pill" onclick="run('bitcoin')">BTC</span>
    <span class="pill" onclick="run('ethereum')">ETH</span>
  </div>

  <div class="search-row">
    <input id="tokenInput" type="text" placeholder="e.g. solana, bonk, bitcoin..." onkeydown="if(event.key==='Enter') run()">
    <button onclick="run()">Check</button>
  </div>

  <div id="output">
    <div class="card">
      <div class="loading">Pick a token above to see its risk score 👆</div>
    </div>
  </div>

  <div class="footer-note">
    Risk Score = Volatility (40%) + Liquidity (30%) + Momentum (30%)<br>
    Market data via CoinGecko · AI insights via Qwen
  </div>

<script>
// ---------------------------------------------------------
// STEP 1: Fetch live market data for a token from CoinGecko
// ---------------------------------------------------------
async function fetchTokenData(query) {
  const slug = query.trim().toLowerCase().replace(/\s+/g, '-');
  let res = await fetch(`https://api.coingecko.com/api/v3/coins/${slug}?localization=false&tickers=false&community_data=false&developer_data=false`);

  if (!res.ok) {
    const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${slug}`);
    const searchData = await searchRes.json();
    if (searchData.coins && searchData.coins.length > 0) {
      const topId = searchData.coins[0].id;
      res = await fetch(`https://api.coingecko.com/api/v3/coins/${topId}?localization=false&tickers=false&community_data=false&developer_data=false`);
    } else {
      throw new Error('Token not found');
    }
  }
  if (!res.ok) throw new Error('Token not found');
  return res.json();
}

// ---------------------------------------------------------
// STEP 2: The Risk Engine — turns raw market data into a score
// ---------------------------------------------------------
function calculateRisk(m) {
  const change = m.price_change_percentage_24h ?? 0;
  const volume = m.total_volume?.usd ?? 0;
  const mcap = m.market_cap?.usd ?? 1;
  const high = m.high_24h?.usd ?? 0;
  const low = m.low_24h?.usd ?? 0;
  const price = m.current_price?.usd ?? 0;

  const volatility = Math.min(Math.abs(change) * 2, 40);

  const volRatio = mcap > 0 ? volume / mcap : 0;
  let liquidity;
  if (volRatio < 0.02) liquidity = 30;
  else if (volRatio < 0.05) liquidity = 20;
  else if (volRatio < 0.10) liquidity = 10;
  else liquidity = 5;

  const range = high - low;
  const position = range > 0 ? (price - low) / range : 0.5;
  const momentum = Math.abs(position - 0.5) * 60;

  const total = Math.min(Math.round(volatility + liquidity + momentum), 100);

  let level, color;
  if (total <= 33) { level = 'Low Risk'; color = 'var(--green)'; }
  else if (total <= 66) { level = 'Medium Risk'; color = 'var(--yellow)'; }
  else { level = 'High Risk'; color = 'var(--red)'; }

  return {
    total, level, color, change, volRatio, position,
    breakdown: {
      volatility: Math.round(volatility),
      liquidity: Math.round(liquidity),
      momentum: Math.round(momentum)
    }
  };
}

// ---------------------------------------------------------
// STEP 3: Rule-based fallback summary (used if AI is unavailable)
// ---------------------------------------------------------
function generateFallbackSummary(risk) {
  const { breakdown, level, change, volRatio, position } = risk;
  const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
  const [topFactor] = sorted[0];

  const reasons = {
    volatility: `a sharp 24h price move of ${change.toFixed(2)}%`,
    liquidity: `relatively thin trading volume (${(volRatio * 100).toFixed(2)}% of market cap)`,
    momentum: `price sitting near its 24h ${position > 0.5 ? 'high' : 'low'}`
  };

  return `${level} — primarily driven by ${reasons[topFactor]}.`;
}

// ---------------------------------------------------------
// STEP 4: Ask our backend (Qwen AI) for a written insight
// ---------------------------------------------------------
async function fetchAIInsight(payload) {
  const res = await fetch('/api/insight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('AI request failed');
  return res.json();
}

// ---------------------------------------------------------
// STEP 5: Render everything
// ---------------------------------------------------------
async function run(presetId) {
  const input = document.getElementById('tokenInput');
  const query = presetId || input.value.trim();
  if (!query) return;
  if (presetId) input.value = '';

  const out = document.getElementById('output');
  out.innerHTML = `<div class="card"><div class="loading">Fetching live data & calculating risk...</div></div>`;

  try {
    const data = await fetchTokenData(query);
    const m = data.market_data;
    const risk = calculateRisk(m);
    const fallback = generateFallbackSummary(risk);
    const initials = data.symbol.substring(0, 4).toUpperCase();
    const isPos = (m.price_change_percentage_24h ?? 0) >= 0;
    const price = m.current_price.usd;
    const priceStr = price >= 1
      ? '$' + price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '$' + price.toFixed(6);

    out.innerHTML = `
      <div class="card">
        <div class="token-header">
          <div class="token-icon">${initials.slice(0,3)}</div>
          <div>
            <div class="token-name">${data.name}</div>
            <div class="token-symbol">${data.symbol}</div>
          </div>
        </div>
        <div class="price-row">
          <div class="price">${priceStr}</div>
          <div class="change ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${(m.price_change_percentage_24h ?? 0).toFixed(2)}% 24h</div>
        </div>

        <div class="score-section">
          <div class="score-ring" style="background: conic-gradient(${risk.color} ${risk.total * 3.6}deg, #1f1f29 0deg)">
            <div class="score-ring-inner">
              <div class="score-num" style="color:${risk.color}">${risk.total}</div>
              <div class="score-max">/ 100</div>
            </div>
          </div>
          <div class="score-label-group">
            <div class="level" style="color:${risk.color}">${risk.level}</div>
            <div class="desc">${fallback}</div>
          </div>
        </div>

        <div class="breakdown-title">Score Breakdown</div>
        <div class="bar-row">
          <div class="bar-label"><span class="name">Volatility</span><span class="val">${risk.breakdown.volatility} / 40</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(risk.breakdown.volatility/40)*100}%; background:var(--accent)"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span class="name">Liquidity Risk</span><span class="val">${risk.breakdown.liquidity} / 30</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(risk.breakdown.liquidity/30)*100}%; background:var(--accent)"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span class="name">Momentum</span><span class="val">${risk.breakdown.momentum} / 30</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(risk.breakdown.momentum/30)*100}%; background:var(--accent)"></div></div>
        </div>
      </div>

      <div class="card ai-card">
        <div class="ai-header">
          <div class="ai-label"><span class="ai-dot"></span>AI Insight</div>
        </div>
        <div id="aiText">
          <div class="ai-shimmer" style="width: 100%"></div>
          <div class="ai-shimmer" style="width: 85%"></div>
          <div class="ai-shimmer" style="width: 60%"></div>
        </div>
      </div>
    `;

    // Fetch AI insight in the background, then swap it in
    try {
      const ai = await fetchAIInsight({
        name: data.name,
        symbol: data.symbol,
        price: priceStr,
        change24h: (m.price_change_percentage_24h ?? 0).toFixed(2),
        riskScore: risk.total,
        riskLevel: risk.level,
        breakdown: risk.breakdown,
        fallback
      });
      document.getElementById('aiText').innerHTML = `<div class="ai-text">${ai.insight}</div>`;
    } catch (e) {
      document.getElementById('aiText').innerHTML = `<div class="ai-text dim">${fallback}</div>`;
    }

  } catch (e) {
    out.innerHTML = `<div class="card"><div class="error">${e.message || 'Something went wrong'}. Try a different token.</div></div>`;
  }
}
</script>
</body>
</html>
