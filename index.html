<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGuard — AI Risk Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070f; --surface:#0f0f1a; --card:#13131f; --card2:#1a1a28;
  --border:#ffffff0f; --border2:#ffffff18;
  --text:#f0f0ff; --text-dim:#7b7b9d; --text-mid:#a0a0c0;
  --accent:#7c6dfa; --accent2:#a78bfa;
  --green:#22d87a; --yellow:#f5c542; --red:#ff4f6a;
  --glow:rgba(124,109,250,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,109,250,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,109,250,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 20px 80px;}

/* Header */
.header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--glow);}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;background:linear-gradient(135deg,#fff 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stats-badge{font-size:11px;color:var(--accent2);background:rgba(124,109,250,0.1);border:1px solid rgba(124,109,250,0.2);padding:4px 10px;border-radius:20px;display:none;white-space:nowrap;}
.stats-badge.show{display:block;}
.header-sub{font-size:13px;color:var(--text-dim);}
.header-sub a{color:var(--accent2);text-decoration:none;}

/* Tabs */
.mode-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:20px;}
.mode-tab{flex:1;text-align:center;padding:9px 0;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all 0.2s;letter-spacing:0.2px;}
.mode-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(124,109,250,0.3);}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.pill{font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text-mid);cursor:pointer;transition:all 0.15s;}
.pill:hover{border-color:var(--accent);color:var(--accent2);background:var(--glow);}

/* Inputs */
.search-row{display:flex;gap:10px;margin-bottom:10px;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--text-dim);}
.check-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px 22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;cursor:pointer;letter-spacing:0.5px;box-shadow:0 4px 16px rgba(124,109,250,0.3);white-space:nowrap;}
.check-btn:active{opacity:0.85;}
.full-btn{width:100%;margin-bottom:16px;}

/* Section visibility */
.section-panel{display:none;}
.section-panel.show{display:block;}

/* Compare */
.compare-vs{text-align:center;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;padding:4px 0;}

/* Cards */
.result-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4;}
.token-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.token-icon{width:48px;height:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);overflow:hidden;flex-shrink:0;}
.token-icon img{width:100%;height:100%;object-fit:cover;}
.token-icon-fallback{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--accent2);display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.token-name{font-size:18px;font-weight:700;}
.token-symbol{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
.price{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:32px;}
.change{font-size:13px;padding:4px 12px;border-radius:20px;font-weight:600;}
.change.pos{background:rgba(34,216,122,0.12);color:var(--green);}
.change.neg{background:rgba(255,79,106,0.12);color:var(--red);}

/* Momentum */
.momentum-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.momentum-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.3px;font-family:'Barlow Condensed',sans-serif;}
.m-rising{background:rgba(255,79,106,0.12);color:var(--red);border:1px solid rgba(255,79,106,0.25);}
.m-falling{background:rgba(34,216,122,0.12);color:var(--green);border:1px solid rgba(34,216,122,0.25);}
.m-stable{background:rgba(245,197,66,0.12);color:var(--yellow);border:1px solid rgba(245,197,66,0.25);}

/* Score */
.score-section{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:22px;border-bottom:1px solid var(--border);}
.score-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.score-ring-inner{width:86px;height:86px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border);}
.score-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;line-height:1;}
.score-max{font-size:10px;color:var(--text-dim);margin-top:1px;}
.score-level{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:0.5px;margin-bottom:6px;}
.score-desc{font-size:13px;color:var(--text-dim);line-height:1.6;}

/* Bars */
.breakdown-title{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;font-weight:600;}
.bar-row{margin-bottom:14px;}
.bar-row:last-child{margin-bottom:0;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;font-weight:500;}
.bar-label .name{color:var(--text-mid);}
.bar-label .val{color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;}
.bar-track{background:var(--surface);border-radius:8px;height:7px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:8px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* AI card */
.ai-card{background:linear-gradient(135deg,rgba(124,109,250,0.07),rgba(167,139,250,0.03));border:1px solid rgba(124,109,250,0.2);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,109,250,0.5),transparent);}
.ai-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ai-text{font-size:14px;line-height:1.75;color:var(--text);}
.ai-text.dim{color:var(--text-dim);font-style:italic;}
.ai-shimmer{height:13px;border-radius:6px;background:linear-gradient(90deg,var(--surface) 25%,var(--card2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Action buttons */
.action-row{display:flex;gap:10px;margin-bottom:6px;}
.action-btn{flex:1;padding:11px 14px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text-dim);font-family:inherit;letter-spacing:0;transition:all 0.15s;}
.action-btn:hover{border-color:var(--accent);color:var(--accent2);}
.action-btn.saved{border-color:var(--green);color:var(--green);background:rgba(34,216,122,0.06);}
.action-btn.share-btn{border-color:rgba(124,109,250,0.3);color:var(--accent2);background:rgba(124,109,250,0.06);}

/* Compare */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.compare-card{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:18px;position:relative;overflow:hidden;}
.compare-card.winner{border-color:rgba(34,216,122,0.35);}
.compare-card.winner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);}
.compare-card.loser{border-color:rgba(255,79,106,0.2);}
.compare-token-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.compare-icon{width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;color:var(--accent2);}
.compare-icon img{width:100%;height:100%;object-fit:cover;}
.compare-name{font-size:13px;font-weight:700;}
.compare-symbol{font-size:10px;color:var(--text-dim);text-transform:uppercase;}
.compare-score-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;line-height:1;margin-bottom:2px;}
.compare-level{font-size:11px;font-weight:700;margin-bottom:12px;}
.compare-bar-row{margin-bottom:7px;}
.compare-bar-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;color:var(--text-dim);}
.compare-bar-track{background:var(--surface);border-radius:4px;height:4px;overflow:hidden;}
.compare-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.compare-verdict{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:14px;font-size:14px;line-height:1.65;text-align:center;color:var(--text-mid);}
.compare-verdict strong{color:var(--accent2);}

/* Watchlist */
.watchlist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.watchlist-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:600;}
.watchlist-clear{font-size:12px;color:var(--text-dim);cursor:pointer;background:none;border:none;padding:0;font-family:inherit;}
.watchlist-clear:hover{color:var(--red);}
.watchlist-grid{display:flex;flex-direction:column;gap:8px;}
.watchlist-item{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;}
.watchlist-item:hover{border-color:var(--accent);}
.watchlist-icon{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;color:var(--accent2);}
.watchlist-icon img{width:100%;height:100%;object-fit:cover;}
.watchlist-info{flex:1;min-width:0;}
.watchlist-name{font-size:14px;font-weight:700;}
.watchlist-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
.watchlist-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;flex-shrink:0;}
.watchlist-remove{font-size:18px;color:var(--text-dim);cursor:pointer;background:none;border:none;padding:0 0 0 4px;font-family:inherit;line-height:1;flex-shrink:0;}
.watchlist-remove:hover{color:var(--red);}
.watchlist-add-btn{width:100%;margin-top:10px;background:transparent;border:1px dashed var(--border2);color:var(--text-dim);border-radius:14px;padding:12px;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:0;}
.watchlist-add-btn:hover{border-color:var(--accent);color:var(--accent2);}

/* Pre-Trade */
.pretrade-result{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.pretrade-result::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4;}
.pretrade-score-section{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.pretrade-score-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:52px;line-height:1;}
.pretrade-level{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:0.5px;}
.position-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:14px;}
.position-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:600;margin-bottom:12px;}
.position-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
.position-label{color:var(--text-dim);}
.position-val{font-weight:600;}
.position-warning{background:rgba(255,79,106,0.08);border:1px solid rgba(255,79,106,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-top:10px;line-height:1.5;}
.position-ok{margin-top:10px;font-size:13px;color:var(--green);}
.flags-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:600;margin-bottom:12px;}
.flag{display:flex;align-items:flex-start;gap:8px;font-size:13px;margin-bottom:8px;line-height:1.5;padding:10px 12px;border-radius:10px;}
.flag.high{background:rgba(255,79,106,0.06);border:1px solid rgba(255,79,106,0.15);color:var(--text-mid);}
.flag.medium{background:rgba(245,197,66,0.06);border:1px solid rgba(245,197,66,0.15);color:var(--text-mid);}
.flag.low{background:rgba(34,216,122,0.06);border:1px solid rgba(34,216,122,0.15);color:var(--text-mid);}
.flag-icon{flex-shrink:0;}
.verdict-card{background:linear-gradient(135deg,rgba(124,109,250,0.07),rgba(167,139,250,0.03));border:1px solid rgba(124,109,250,0.2);border-radius:16px;padding:18px;margin-top:14px;}
.verdict-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.verdict-text{font-size:14px;line-height:1.75;color:var(--text);}

/* Share Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:24px;width:100%;max-width:400px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;margin-bottom:18px;}
.share-preview{background:var(--bg);border:1px solid var(--border2);border-radius:18px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.share-preview::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5;}
.share-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.share-icon{width:44px;height:44px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--accent2);}
.share-icon img{width:100%;height:100%;object-fit:cover;}
.share-token-name{font-size:17px;font-weight:700;}
.share-token-symbol{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
.share-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:72px;line-height:1;margin-bottom:2px;}
.share-level{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:1px;margin-bottom:14px;}
.share-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.share-stat{background:var(--card);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border);}
.share-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.share-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--accent2);}
.share-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.share-price{font-size:13px;font-weight:600;}
.share-brand{font-size:11px;color:var(--text-dim);}
.modal-hint{font-size:12px;color:var(--text-dim);margin-bottom:14px;text-align:center;}
.modal-actions{display:flex;gap:8px;}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;border:none;}
.modal-btn-close{background:var(--surface);border:1px solid var(--border2);color:var(--text-dim);}
.modal-btn-copy{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}

/* API section */
.api-section{margin-top:32px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:22px;}
.api-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;margin-bottom:6px;}
.api-desc{font-size:13px;color:var(--text-dim);margin-bottom:16px;}
.api-endpoints{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.api-endpoint{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all 0.15s;}
.api-endpoint:hover{border-color:var(--accent);}
.api-method{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--accent2);background:rgba(124,109,250,0.12);border-radius:6px;padding:3px 8px;flex-shrink:0;letter-spacing:0.5px;}
.api-path{font-family:monospace;font-size:12px;color:var(--text-mid);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.api-arrow{font-size:14px;color:var(--text-dim);flex-shrink:0;}
.api-response-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:10px;}
.api-response{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-family:monospace;font-size:12px;line-height:1.9;overflow-x:auto;}
.json-key{color:var(--accent2);}
.json-str{color:var(--green);}
.json-num{color:var(--yellow);}

/* Empty + error states */
.empty-state{text-align:center;padding:48px 20px;background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;}
